name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  size-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: pascalgn/size-label-action@v0.5.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          sizes: >
            {
              "0": "size/xs",
              "20": "size/s",
              "50": "size/m",
              "200": "size/l",
              "800": "size/xl",
              "2000": "size/xxl"
            }
